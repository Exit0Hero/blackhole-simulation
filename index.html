<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Hole Simulation</title>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/examples/jsm/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <style>
        :root {
            color-scheme: dark;
            --bg: #020307;
            --panel: rgba(9, 12, 24, 0.56);
            --text: #eef4ff;
            --muted: rgba(238, 244, 255, 0.72);
            --accent: #ffbf6b;
            --accent-2: #7ce7ff;
        }

        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background:
                radial-gradient(circle at 20% 20%, rgba(124, 231, 255, 0.12), transparent 28%),
                radial-gradient(circle at 80% 25%, rgba(255, 191, 107, 0.1), transparent 26%),
                radial-gradient(circle at 50% 50%, #070815 0%, #020307 55%, #000 100%);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        #app {
            position: fixed;
            inset: 0;
        }

        canvas {
            display: block;
        }

        .ui {
            position: absolute;
            top: 24px;
            left: 24px;
            z-index: 2;
            max-width: 420px;
            padding: 18px 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 18px;
            background: var(--panel);
            backdrop-filter: blur(14px);
            box-shadow: 0 18px 60px rgba(0, 0, 0, 0.35);
        }

        .eyebrow {
            margin: 0 0 8px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-size: 0.72rem;
            color: var(--accent-2);
        }

        h1 {
            margin: 0 0 10px;
            font-size: clamp(2rem, 4vw, 3.4rem);
            line-height: 0.95;
            letter-spacing: -0.06em;
            color: var(--text);
        }

        p {
            margin: 0;
            color: var(--muted);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .legend {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 10px 12px;
            margin-top: 16px;
            font-size: 0.88rem;
            color: var(--muted);
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 999px;
            margin-top: 5px;
        }

        .dot.halo { background: var(--accent); box-shadow: 0 0 14px rgba(255, 191, 107, 0.8); }
        .dot.lens { background: var(--accent-2); box-shadow: 0 0 14px rgba(124, 231, 255, 0.8); }

        .hint {
            position: absolute;
            right: 24px;
            bottom: 24px;
            z-index: 2;
            padding: 12px 14px;
            border-radius: 999px;
            background: rgba(8, 10, 18, 0.48);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.72);
            font-size: 0.84rem;
            backdrop-filter: blur(14px);
        }

        @media (max-width: 700px) {
            .ui {
                left: 14px;
                right: 14px;
                top: 14px;
                max-width: none;
            }

            .hint {
                left: 14px;
                right: 14px;
                bottom: 14px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <div class="ui">
        <p class="eyebrow">Astrophysics demo</p>
        <h1>Black Hole Lensing</h1>
        <p>A stylized 3D scene with a glowing accretion disk, halo rings, and curved light paths that bend around the event horizon.</p>
        <div class="legend">
            <span class="dot halo"></span><span>Hot halo rings and accretion glow</span>
            <span class="dot lens"></span><span>Light rays warped by gravity</span>
        </div>
    </div>
    <div class="hint">Drag to orbit. Scroll to zoom.</div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls.js';

        const app = document.getElementById('app');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x020307, 0.09);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
        camera.position.set(0, 3.4, 13.5);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        app.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.minDistance = 6.5;
        controls.maxDistance = 20;
        controls.maxPolarAngle = Math.PI * 0.9;

        const ambient = new THREE.AmbientLight(0x335577, 0.7);
        scene.add(ambient);

        const keyLight = new THREE.PointLight(0xffcc88, 9, 80, 2);
        keyLight.position.set(9, 7, 8);
        scene.add(keyLight);

        const fillLight = new THREE.PointLight(0x77ddff, 4, 70, 2);
        fillLight.position.set(-8, -4, -5);
        scene.add(fillLight);

        const blackHoleGroup = new THREE.Group();
        scene.add(blackHoleGroup);

        const eventHorizon = new THREE.Mesh(
            new THREE.SphereGeometry(1.42, 64, 64),
            new THREE.MeshBasicMaterial({ color: 0x000000 })
        );
        blackHoleGroup.add(eventHorizon);

        const haloMaterial = new THREE.MeshBasicMaterial({
            color: 0xffb25b,
            transparent: true,
            opacity: 0.46,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            side: THREE.DoubleSide
        });

        const lensingRing = new THREE.Mesh(new THREE.TorusGeometry(2.15, 0.18, 28, 220), haloMaterial.clone());
        lensingRing.rotation.x = Math.PI * 0.5;
        lensingRing.material.opacity = 0.72;
        blackHoleGroup.add(lensingRing);

        const outerRing = new THREE.Mesh(new THREE.TorusGeometry(3.25, 0.11, 24, 300), haloMaterial.clone());
        outerRing.rotation.x = Math.PI * 0.5;
        outerRing.material.color.setHex(0x6fe8ff);
        outerRing.material.opacity = 0.44;
        blackHoleGroup.add(outerRing);

        const coronaRing = new THREE.Mesh(
            new THREE.TorusGeometry(1.95, 0.3, 24, 220),
            new THREE.MeshBasicMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0.18,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                side: THREE.DoubleSide
            })
        );
        coronaRing.rotation.x = Math.PI * 0.5;
        coronaRing.material.color.setHex(0xffd6a2);
        blackHoleGroup.add(coronaRing);

        const glowSphere = new THREE.Mesh(
            new THREE.SphereGeometry(3.4, 64, 64),
            new THREE.ShaderMaterial({
                transparent: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending,
                uniforms: {
                    glowColor: { value: new THREE.Color(0x8ddfff) },
                    intensity: { value: 2.6 }
                },
                vertexShader: `
                    varying vec3 vNormal;
                    varying vec3 vPosition;
                    void main() {
                        vNormal = normalize(normalMatrix * normal);
                        vPosition = position;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    varying vec3 vNormal;
                    varying vec3 vPosition;
                    uniform vec3 glowColor;
                    uniform float intensity;
                    void main() {
                        float fresnel = pow(1.0 - abs(dot(normalize(vNormal), vec3(0.0, 0.0, 1.0))), 1.9);
                        float vignette = smoothstep(1.5, 0.05, length(vPosition.xy));
                        gl_FragColor = vec4(glowColor * fresnel * vignette * intensity, fresnel * 0.88);
                    }
                `
            })
        );
        blackHoleGroup.add(glowSphere);

        const wideGlow = new THREE.Mesh(
            new THREE.SphereGeometry(5.2, 64, 64),
            new THREE.ShaderMaterial({
                transparent: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending,
                side: THREE.BackSide,
                uniforms: {
                    glowColor: { value: new THREE.Color(0x3acbff) }
                },
                vertexShader: `
                    varying vec3 vNormal;
                    void main() {
                        vNormal = normalize(normalMatrix * normal);
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    varying vec3 vNormal;
                    uniform vec3 glowColor;
                    void main() {
                        float fresnel = pow(1.0 - abs(dot(normalize(vNormal), vec3(0.0, 0.0, 1.0))), 2.3);
                        gl_FragColor = vec4(glowColor * fresnel, fresnel * 0.16);
                    }
                `
            })
        );
        blackHoleGroup.add(wideGlow);

        const diskGroup = new THREE.Group();
        diskGroup.rotation.x = Math.PI * 0.36;
        blackHoleGroup.add(diskGroup);

        function makeDisk(radius, tube, colorA, colorB, opacity) {
            return new THREE.Mesh(
                new THREE.TorusGeometry(radius, tube, 24, 280),
                new THREE.ShaderMaterial({
                    transparent: true,
                    depthWrite: false,
                    side: THREE.DoubleSide,
                    blending: THREE.AdditiveBlending,
                    uniforms: {
                        colorA: { value: new THREE.Color(colorA) },
                        colorB: { value: new THREE.Color(colorB) },
                        time: { value: 0 },
                        opacityValue: { value: opacity }
                    },
                    vertexShader: `
                        varying vec2 vUv;
                        varying vec3 vPosition;
                        void main() {
                            vUv = uv;
                            vPosition = position;
                            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                        }
                    `,
                    fragmentShader: `
                        varying vec2 vUv;
                        varying vec3 vPosition;
                        uniform vec3 colorA;
                        uniform vec3 colorB;
                        uniform float time;
                        uniform float opacityValue;

                        float hash(vec2 p) {
                            return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123);
                        }

                        float noise(vec2 p) {
                            vec2 i = floor(p);
                            vec2 f = fract(p);
                            vec2 u = f * f * (3.0 - 2.0 * f);
                            return mix(
                                mix(hash(i + vec2(0.0, 0.0)), hash(i + vec2(1.0, 0.0)), u.x),
                                mix(hash(i + vec2(0.0, 1.0)), hash(i + vec2(1.0, 1.0)), u.x),
                                u.y
                            );
                        }

                        void main() {
                            float radial = length(vPosition.xy);
                            float ringMask = smoothstep(0.62, 0.18, abs(radial - 1.0));
                            float heat = smoothstep(1.45, 0.2, radial) * smoothstep(0.25, 0.9, radial);
                            float swirl = sin((vUv.x * 42.0) + time * 1.8 + radial * 12.0) * 0.5 + 0.5;
                            float spark = pow(noise(vUv * 120.0 + time * 0.8), 4.0);
                            vec3 col = mix(colorA, colorB, clamp(radial * 0.8 + swirl * 0.2, 0.0, 1.0));
                            float alpha = ringMask * heat * (0.6 + swirl * 0.25 + spark * 0.35) * opacityValue;
                            gl_FragColor = vec4(col, alpha);
                        }
                    `
                })
            );
        }

        const innerDisk = makeDisk(2.55, 0.16, 0xffe2a8, 0xff8d39, 0.95);
        const midDisk = makeDisk(3.55, 0.12, 0x84e4ff, 0xffb763, 0.82);
        const outerDisk = makeDisk(4.7, 0.09, 0x4cc7ff, 0xffffff, 0.48);
        diskGroup.add(outerDisk, midDisk, innerDisk);

        const starCount = 1600;
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            const radius = 45 + Math.random() * 80;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(THREE.MathUtils.randFloatSpread(2));
            starPositions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
            starPositions[i * 3 + 1] = radius * Math.cos(phi);
            starPositions[i * 3 + 2] = radius * Math.sin(phi) * Math.sin(theta);
        }

        const starGeometry = new THREE.BufferGeometry();
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const stars = new THREE.Points(
            starGeometry,
            new THREE.PointsMaterial({
                color: 0xcfe8ff,
                size: 0.12,
                sizeAttenuation: true,
                transparent: true,
                opacity: 0.8
            })
        );
        scene.add(stars);

        const rayCount = 72;
        const rayMeshes = [];
        const rayMaterial = new THREE.LineBasicMaterial({
            color: 0x8eeaff,
            transparent: true,
            opacity: 0.5,
            blending: THREE.AdditiveBlending
        });

        function createBentRay(seed, tint) {
            const segments = 180;
            const points = [];
            const side = seed % 2 === 0 ? -1 : 1;
            const vertical = ((seed % 5) - 2) * 0.18;
            const depth = ((seed % 7) - 3) * 0.16;
            const shift = seed * 0.35;

            for (let i = 0; i < segments; i++) {
                const t = i / (segments - 1);
                const travel = THREE.MathUtils.lerp(-11.5, 11.5, t);
                const closestApproach = 1.75 + Math.abs(Math.sin(seed * 0.7)) * 1.2;
                const distance = Math.sqrt(travel * travel + 0.15);
                const lens = 4.8 / Math.pow(distance + closestApproach, 1.28);
                const pinch = Math.exp(-Math.pow(travel / 3.8, 2));
                const ripple = Math.sin(t * 14.0 + shift) * 0.06;
                const x = travel;
                const y = vertical + Math.sin(t * Math.PI * 1.4 + shift) * 0.36 + lens * 0.85 * side + ripple;
                const z = depth + side * lens * 3.1 + Math.cos(t * Math.PI * 1.15 + shift) * 0.08 - pinch * 0.35 * side;
                points.push(new THREE.Vector3(x, y, z));
            }

            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const material = rayMaterial.clone();
            material.color = new THREE.Color(tint);
            material.opacity = 0.33 + Math.random() * 0.18;
            return new THREE.Line(geometry, material);
        }

        for (let i = 0; i < rayCount; i++) {
            const ray = createBentRay(i, i % 3 === 0 ? 0xffc36b : 0x8eeaff);
            ray.rotation.y = (i / rayCount) * Math.PI * 2;
            ray.rotation.x = (i % 4) * 0.08 - 0.12;
            scene.add(ray);
            rayMeshes.push(ray);
        }

        const ribbonCount = 24;
        const ribbons = [];
        for (let i = 0; i < ribbonCount; i++) {
            const points = [];
            const steps = 60;
            const baseAngle = (i / ribbonCount) * Math.PI * 2;
            const tilt = -0.3 + (i % 6) * 0.06;
            for (let j = 0; j < steps; j++) {
                const t = j / (steps - 1);
                const radius = 5.4 - t * 3.0 + Math.sin(t * 10 + i) * 0.08;
                const angle = baseAngle + t * 5.5 + Math.sin(t * 7.5 + i) * 0.45;
                const x = Math.cos(angle) * radius;
                const z = Math.sin(angle) * radius;
                const y = Math.sin(angle * 2.0 + i) * 0.35 + tilt;
                points.push(new THREE.Vector3(x, y, z));
            }
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const material = new THREE.LineBasicMaterial({
                color: i % 2 === 0 ? 0xffb35f : 0x68d8ff,
                transparent: true,
                opacity: 0.4,
                blending: THREE.AdditiveBlending
            });
            const line = new THREE.Line(geometry, material);
            line.rotation.x = Math.PI * 0.08;
            ribbons.push(line);
            scene.add(line);
        }

        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const elapsed = clock.getElapsedTime();
            controls.update();

            blackHoleGroup.rotation.y = elapsed * 0.16;
            diskGroup.rotation.z = elapsed * 0.32;
            lensingRing.rotation.z = elapsed * -0.14;
            outerRing.rotation.z = elapsed * 0.08;
            coronaRing.rotation.z = elapsed * 0.18;
            glowSphere.scale.setScalar(1 + Math.sin(elapsed * 1.3) * 0.03);
            wideGlow.scale.setScalar(1 + Math.sin(elapsed * 0.9) * 0.02);
            stars.rotation.y = elapsed * 0.012;

            rayMeshes.forEach((ray, index) => {
                ray.rotation.y = elapsed * 0.06 + index * 0.1;
                ray.material.opacity = 0.12 + Math.sin(elapsed * 1.6 + index) * 0.04 + 0.06;
            });

            ribbons.forEach((ribbon, index) => {
                ribbon.rotation.y = elapsed * 0.04 + index * 0.05;
                ribbon.material.opacity = 0.13 + (Math.sin(elapsed * 1.4 + index * 0.3) + 1) * 0.03;
            });

            [innerDisk, midDisk, outerDisk].forEach((disk, index) => {
                disk.material.uniforms.time.value = elapsed + index * 0.8;
                disk.rotation.z = elapsed * (0.24 + index * 0.05);
            });

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        });
    </script>
</body>
</html>
